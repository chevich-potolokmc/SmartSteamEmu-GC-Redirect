name: Build SmartSteamEmu

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Clone SmartSteamEmu
      run: |
        git clone https://github.com/MAXBURAOT/SmartSteamEmu.git
        Write-Host "📂 Структура репозитория:"
        Get-ChildItem SmartSteamEmu -Recurse -Directory -Depth 2 | Select-Object FullName
    
    - name: Copy patch
      run: |
        Write-Host "🔍 Поиск директории для патча..."
        
        $srcDirs = Get-ChildItem SmartSteamEmu -Recurse -Directory -Filter "src" -ErrorAction SilentlyContinue
        
        if ($srcDirs) {
          $targetDir = $srcDirs[0].FullName
          Write-Host "✅ Найдена директория: $targetDir"
          Copy-Item "SteamGameCoordinator_Redirect.h" "$targetDir\" -Force
          Write-Host "✅ Patch скопирован в $targetDir"
        } else {
          Write-Host "⚠️ Директория src не найдена, копируем в корень"
          Copy-Item "SteamGameCoordinator_Redirect.h" "SmartSteamEmu\" -Force
          Write-Host "✅ Patch скопирован в SmartSteamEmu\"
        }
        
        Write-Host "📄 Проверка файла:"
        Get-ChildItem SmartSteamEmu -Recurse -Filter "SteamGameCoordinator_Redirect.h" | Select-Object FullName
    
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
    
    - name: Install .NET Framework 4.8 Dev Pack
      shell: cmd
      run: |
        echo Installing .NET Framework 4.8 Developer Pack...
        choco install netfx-4.8-devpack -y --no-progress
        if %ERRORLEVEL% NEQ 0 (
          echo Warning: Failed to install, but continuing...
        )
    
    - name: Find solution
      id: find_sln
      run: |
        $slnFile = Get-ChildItem SmartSteamEmu -Recurse -Filter "*.sln" | Select-Object -First 1
        
        if ($slnFile) {
          Write-Host "✅ Найден: $($slnFile.FullName)"
          $slnPath = $slnFile.FullName -replace '\\', '/'
          echo "SLN_PATH=$slnPath" >> $env:GITHUB_OUTPUT
          
          Write-Host ""
          Write-Host "📄 Содержимое .sln:"
          Get-Content $slnFile.FullName | Select-String "Project|Release|Debug" | Select-Object -First 20
        } else {
          Write-Host "❌ .sln файл не найден!"
          exit 1
        }
    
    - name: Restore NuGet packages
      run: |
        $slnPath = "${{ steps.find_sln.outputs.SLN_PATH }}"
        Write-Host "📦 Восстановление NuGet пакетов для: $slnPath"
        nuget restore "$slnPath" -NonInteractive
    
    - name: Build
      run: |
        $slnPath = "${{ steps.find_sln.outputs.SLN_PATH }}"
        Write-Host "🔨 Компиляция: $slnPath"
        
        # Пробуем скомпилировать с дефолтной конфигурацией
        msbuild "$slnPath" /p:Configuration=Release /m /v:minimal /nologo /p:WarningLevel=0
        
        if ($LASTEXITCODE -ne 0) {
          Write-Host "⚠️ Ошибка компиляции с Release, пробуем Debug..."
          msbuild "$slnPath" /p:Configuration=Debug /m /v:minimal /nologo /p:WarningLevel=0
        }
        
        Write-Host "✅ Компиляция завершена"
    
    - name: Find DLLs
      run: |
        Write-Host "🔍 Поиск всех DLL файлов..."
        Get-ChildItem SmartSteamEmu -Recurse -Filter "*.dll" | ForEach-Object {
          Write-Host "  📄 $($_.FullName) ($($_.Length) bytes)"
        }
    
    - name: Package
      run: |
        New-Item -ItemType Directory -Path "output" -Force
        
        Write-Host "📦 Упаковка файлов..."
        
        # Ищем SmartSteamEmu DLL
        $allDlls = Get-ChildItem SmartSteamEmu -Recurse -Filter "SmartSteamEmu*.dll" -ErrorAction SilentlyContinue
        
        if ($allDlls) {
          Write-Host "✅ Найдено DLL файлов: $($allDlls.Count)"
          
          foreach ($dll in $allDlls) {
            $relativePath = $dll.FullName -replace [regex]::Escape((Get-Item SmartSteamEmu).FullName), ""
            Write-Host "  📄 $relativePath"
            
            # Определяем имя по пути
            $destName = $dll.Name
            if ($relativePath -match "x64|64") {
              $destName = "SmartSteamEmu64.dll"
            } elseif ($relativePath -match "x86|Win32|32") {
              $destName = "SmartSteamEmu.dll"
            }
            
            Copy-Item $dll.FullName "output\$destName" -Force
            Write-Host "  ✅ Скопирован как: $destName"
          }
        } else {
          Write-Host "❌ SmartSteamEmu DLL не найдены!"
          Write-Host "Все DLL в проекте:"
          Get-ChildItem SmartSteamEmu -Recurse -Filter "*.dll" | Select-Object FullName
        }
        
        # Копируем конфиг
        if (Test-Path "SmartSteamEmu.ini") {
          Copy-Item "SmartSteamEmu.ini" "output\"
          Write-Host "✅ SmartSteamEmu.ini скопирован"
        }
        
        # README
        $readme = "SmartSteamEmu with Game Coordinator Redirect`n"
        $readme += "Build: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')`n`n"
        $readme += "Installation:`n"
        $readme += "1. Copy SmartSteamEmu.dll to game folder (replace existing)`n"
        $readme += "2. Edit SmartSteamEmu.ini and add:`n`n"
        $readme += "[GameCoordinator]`n"
        $readme += "EnableRedirect = 1`n"
        $readme += "ServerIP = 127.0.0.1`n"
        $readme += "ServerPort = 27016`n`n"
        $readme += "3. Start: node custom-gc/gc-server-v3.js`n"
        $readme += "4. Launch game via SSELauncher`n"
        $readme += "5. Check UI matchmaking!`n"
        $readme | Out-File "output\README.txt" -Encoding UTF8
        
        Write-Host ""
        Write-Host "📦 Содержимое output:"
        Get-ChildItem output | Format-Table Name, Length -AutoSize
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SmartSteamEmu-GC-Redirect
        path: output/
        if-no-files-found: warn
