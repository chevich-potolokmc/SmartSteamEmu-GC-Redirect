name: Build SmartSteamEmu

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Clone SmartSteamEmu
      run: |
        git clone https://github.com/MAXBURAOT/SmartSteamEmu.git
        Write-Host "📂 Структура репозитория:"
        Get-ChildItem SmartSteamEmu -Recurse -Directory -Depth 2 | Select-Object FullName
    
    - name: Copy patch
      run: |
        Write-Host "🔍 Поиск директории для патча..."
        
        $srcDirs = Get-ChildItem SmartSteamEmu -Recurse -Directory -Filter "src" -ErrorAction SilentlyContinue
        
        if ($srcDirs) {
          $targetDir = $srcDirs[0].FullName
          Write-Host "✅ Найдена директория: $targetDir"
          Copy-Item "SteamGameCoordinator_Redirect.h" "$targetDir\" -Force
          Write-Host "✅ Patch скопирован в $targetDir"
        } else {
          Write-Host "⚠️ Директория src не найдена, копируем в корень"
          Copy-Item "SteamGameCoordinator_Redirect.h" "SmartSteamEmu\" -Force
          Write-Host "✅ Patch скопирован в SmartSteamEmu\"
        }
        
        Write-Host "📄 Проверка файла:"
        Get-ChildItem SmartSteamEmu -Recurse -Filter "SteamGameCoordinator_Redirect.h" | Select-Object FullName
    
    - name: Setup .NET Framework
      run: |
        Write-Host "📦 Установка .NET Framework 4.8 Developer Pack..."
        $url = "https://download.visualstudio.microsoft.com/download/pr/014120d7-d689-4305-befd-3cb711108212/0fd66638cde16859462a6243a4629a50/ndp48-devpack-enu.exe"
        $output = "$env:TEMP\ndp48-devpack.exe"
        
        Write-Host "⬇️ Скачивание..."
        Invoke-WebRequest -Uri $url -OutFile $output
        
        Write-Host "⚙️ Установка..."
        Start-Process -FilePath $output -Args "/quiet /norestart" -Wait
        
        Write-Host "✅ .NET Framework 4.8 установлен"
    
    - name: Find solution
      id: find_sln
      run: |
        $slnFile = Get-ChildItem SmartSteamEmu -Recurse -Filter "*.sln" | Select-Object -First 1
        
        if ($slnFile) {
          Write-Host "✅ Найден: $($slnFile.FullName)"
          echo "SLN_PATH=$($slnFile.FullName)" >> $env:GITHUB_OUTPUT
          
          Write-Host ""
          Write-Host "📄 Анализ конфигураций:"
          $content = Get-Content $slnFile.FullName -Raw
          if ($content -match "Release\|") {
            Write-Host "✅ Найдены Release конфигурации"
          }
        } else {
          Write-Host "❌ .sln файл не найден!"
          exit 1
        }
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Restore NuGet packages
      run: |
        $slnPath = "${{ steps.find_sln.outputs.SLN_PATH }}"
        Write-Host "📦 Восстановление NuGet пакетов..."
        nuget restore "$slnPath"
    
    - name: Build Release
      run: |
        $slnPath = "${{ steps.find_sln.outputs.SLN_PATH }}"
        Write-Host "🔨 Компиляция Release..."
        msbuild "$slnPath" /p:Configuration=Release /m /v:minimal /nologo
        
        if ($LASTEXITCODE -ne 0) {
          Write-Host "❌ Ошибка компиляции"
          exit 1
        }
        
        Write-Host "✅ Компиляция успешна"
    
    - name: Find compiled DLLs
      run: |
        Write-Host "🔍 Поиск скомпилированных DLL..."
        Get-ChildItem SmartSteamEmu -Recurse -Filter "*.dll" | Where-Object { 
          $_.Name -like "SmartSteamEmu*" -and $_.Directory.Name -match "Release|Bin|Output"
        } | ForEach-Object {
          Write-Host "  ✅ $($_.FullName)"
        }
    
    - name: Package
      run: |
        New-Item -ItemType Directory -Path "output" -Force
        
        Write-Host "� Упаковка DLL файлов..."
        
        $dlls = Get-ChildItem SmartSteamEmu -Recurse -Filter "*.dll" | Where-Object { 
          $_.Name -like "SmartSteamEmu*" -and $_.Directory.Name -match "Release|Bin|Output"
        }
        
        if ($dlls) {
          foreach ($dll in $dlls) {
            $destName = $dll.Name
            if ($dll.Directory.FullName -match "x64") {
              $destName = "SmartSteamEmu64.dll"
            } elseif ($dll.Directory.FullName -match "x86|Win32") {
              $destName = "SmartSteamEmu.dll"
            }
            
            Copy-Item $dll.FullName "output\$destName" -Force
            Write-Host "  ✅ $destName"
          }
        } else {
          Write-Host "⚠️ DLL не найдены, копируем всё что есть..."
          Get-ChildItem SmartSteamEmu -Recurse -Filter "SmartSteamEmu*.dll" | ForEach-Object {
            Copy-Item $_.FullName "output\" -Force
            Write-Host "  ✅ $($_.Name)"
          }
        }
        
        if (Test-Path "SmartSteamEmu.ini") {
          Copy-Item "SmartSteamEmu.ini" "output\"
          Write-Host "  ✅ SmartSteamEmu.ini"
        }
        
        $readmeContent = "SmartSteamEmu with Game Coordinator Redirect`n"
        $readmeContent += "Build completed: $(Get-Date)`n`n"
        $readmeContent += "Installation:`n"
        $readmeContent += "1. Copy SmartSteamEmu.dll to game folder`n"
        $readmeContent += "2. Edit SmartSteamEmu.ini:`n"
        $readmeContent += "   [GameCoordinator]`n"
        $readmeContent += "   EnableRedirect = 1`n"
        $readmeContent += "   ServerIP = 127.0.0.1`n"
        $readmeContent += "   ServerPort = 27016`n"
        $readmeContent += "3. Run custom GC server`n"
        $readmeContent += "4. Launch game`n"
        $readmeContent | Out-File "output\README.txt"
        
        Write-Host ""
        Write-Host "📦 Содержимое output:"
        Get-ChildItem output | Select-Object Name, Length
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: SmartSteamEmu-GC-Redirect
        path: output/
