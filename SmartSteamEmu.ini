# SmartSteamEmu Configuration with GC Redirect
# Скопируй этот файл в папку с игрой

[SmartSteamEmu]
AppId = 730
Language = russian
SteamIdGeneration = GenerateRandom
LowViolence = 0
Offline = 0

PersonaName = AccountName
AutomaticallyJoinInvite = 1

StorageOnAppdata = 1
SeparateStorageByName = 0

EnableHTTP = 1
EnableInGameVoice = 1
EnableLobbyFilter = 1
EnableOverlay = 0
DisableFriendList = 0
DisableLeaderboard = 0
SecuredServer = 0
VR = 0
RandomItemAwards = 1
DisableGC = 0

[GameCoordinator]
# Включить перенаправление GC на кастомный сервер
EnableRedirect = 1

# IP адрес кастомного GC сервера
ServerIP = 127.0.0.1

# TCP порт кастомного GC сервера
ServerPort = 27016
